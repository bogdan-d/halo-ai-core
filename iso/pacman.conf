# ============================================================
# Halo AI Core ISO — Pacman Configuration
# Used during ISO build (mkarchiso) and in the live environment
# ============================================================

[options]
HoldPkg      = pacman glibc
Architecture = x86_64
CheckSpace
ParallelDownloads = 16
SigLevel     = Required DatabaseOptional
LocalFileSigLevel = Optional

# Standard Arch repos
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist
