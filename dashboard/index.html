<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>>> halo-ai_ CORE</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --text-muted: #484f58;
      --cyan: #00d4ff;
      --green: #3fb950;
      --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .page {
      text-align: center;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 2rem;
    }

    .logo {
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 3rem;
    }

    .logo .chevron { color: var(--cyan); }
    .logo .name { color: var(--cyan); }
    .logo .underscore { color: var(--text); }
    .logo .core { color: var(--text); font-weight: 900; letter-spacing: 0.1em; }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
    }

    .panel:hover {
      border-color: rgba(0, 212, 255, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    .panel-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin: 0 auto 1.25rem;
    }

    .panel-dot.on { background: var(--green); box-shadow: 0 0 10px rgba(63, 185, 80, 0.5); }
    .panel-dot.off { background: var(--text-muted); }

    .panel-name {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .panel-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .footer {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    @media (max-width: 500px) {
      .panels { grid-template-columns: 1fr; }
      .logo { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">
      <span class="chevron">&gt;&gt;</span>
      <span class="name"> halo-ai</span><span class="underscore">_</span>
      <span class="core"> CORE</span>
    </div>

    <div class="panels">
      <a class="panel" id="panel-lemonade" href="/" target="_blank">
        <div class="panel-dot off" id="dot-lemonade"></div>
        <div class="panel-name">Lemonade</div>
        <div class="panel-desc">LLM + media inference</div>
      </a>
      <a class="panel" id="panel-gaia" href="/" target="_blank">
        <div class="panel-dot off" id="dot-gaia"></div>
        <div class="panel-name">Gaia</div>
        <div class="panel-desc">AI agents</div>
      </a>
    </div>

    <div class="footer">designed and built by the architect</div>
  </div>

  <script>
    const O = window.location.origin

    // Click → opens service in new tab
    document.getElementById('panel-lemonade').href = `${O}/v1/models`
    document.getElementById('panel-gaia').href = `${O}/gaia/`

    async function check(id, path) {
      try {
        const r = await fetch(`${O}${path}`, { signal: AbortSignal.timeout(3000) })
        document.getElementById(id).className = r.ok ? 'panel-dot on' : 'panel-dot off'
      } catch {
        document.getElementById(id).className = 'panel-dot off'
      }
    }

    check('dot-lemonade', '/v1/models')
    check('dot-gaia', '/gaia/')
    setInterval(() => { check('dot-lemonade', '/v1/models'); check('dot-gaia', '/gaia/') }, 10000)
  </script>
</body>
</html>
