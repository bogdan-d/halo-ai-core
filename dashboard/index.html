<!DOCTYPE html>
<html lang="en" data-theme="dark" data-glass="frosted" data-wallpaper="grid">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>>> halo-ai_ CORE</title>
  <style>
    /* ── Themes ── */
    [data-theme="dark"] {
      --bg: #0d1117; --surface: #161b22; --border: #21262d;
      --text: #e6edf3; --text-dim: #8b949e; --text-muted: #484f58;
      --accent: #00d4ff; --green: #3fb950; --line: rgba(230,237,243,0.08);
      --settings-bg: #161b22; --settings-border: #30363d;
      --btn-bg: #21262d; --btn-active: #00d4ff;
      --glass-frosted: rgba(22,27,34,0.7); --glass-clear: rgba(22,27,34,0.3);
      --glass-holo: rgba(22,27,34,0.4);
      --glow-border: rgba(0,212,255,0.3); --glow-shadow: rgba(0,212,255,0.1);
      --dot-green: rgba(63,185,80,0.5);
      --npu-color: #3fb950; --gpu-color: #00d4ff; --img-color: #e879f9; --audio-color: #fb923c;
    }
    [data-theme="light"] {
      --bg: #f0f3f6; --surface: #ffffff; --border: #d0d7de;
      --text: #1f2328; --text-dim: #656d76; --text-muted: #8c959f;
      --accent: #0078d4; --green: #1a7f37; --line: rgba(31,35,40,0.1);
      --settings-bg: #ffffff; --settings-border: #d0d7de;
      --btn-bg: #e8ecef; --btn-active: #0078d4;
      --glass-frosted: rgba(255,255,255,0.7); --glass-clear: rgba(255,255,255,0.3);
      --glass-holo: rgba(255,255,255,0.4);
      --glow-border: rgba(0,120,212,0.3); --glow-shadow: rgba(0,120,212,0.1);
      --dot-green: rgba(26,127,55,0.5);
      --npu-color: #1a7f37; --gpu-color: #0078d4; --img-color: #9333ea; --audio-color: #ea580c;
    }
    [data-theme="midnight"] {
      --bg: #020817; --surface: #0a1628; --border: #1a2744;
      --text: #c8d6e5; --text-dim: #6b7fa3; --text-muted: #3a4f6f;
      --accent: #4facfe; --green: #00f5a0; --line: rgba(200,214,229,0.06);
      --settings-bg: #0a1628; --settings-border: #1a2744;
      --btn-bg: #132040; --btn-active: #4facfe;
      --glass-frosted: rgba(10,22,40,0.7); --glass-clear: rgba(10,22,40,0.3);
      --glass-holo: rgba(10,22,40,0.4);
      --glow-border: rgba(79,172,254,0.3); --glow-shadow: rgba(79,172,254,0.1);
      --dot-green: rgba(0,245,160,0.5);
      --npu-color: #00f5a0; --gpu-color: #4facfe; --img-color: #c084fc; --audio-color: #fdba74;
    }
    [data-theme="ember"] {
      --bg: #1a0a0a; --surface: #2a1215; --border: #4a2025;
      --text: #f0d0c0; --text-dim: #a08070; --text-muted: #604540;
      --accent: #ff6b35; --green: #ffd700; --line: rgba(240,208,192,0.06);
      --settings-bg: #2a1215; --settings-border: #4a2025;
      --btn-bg: #3a1a20; --btn-active: #ff6b35;
      --glass-frosted: rgba(42,18,21,0.7); --glass-clear: rgba(42,18,21,0.3);
      --glass-holo: rgba(42,18,21,0.4);
      --glow-border: rgba(255,107,53,0.3); --glow-shadow: rgba(255,107,53,0.1);
      --dot-green: rgba(255,215,0,0.5);
      --npu-color: #ffd700; --gpu-color: #ff6b35; --img-color: #f472b6; --audio-color: #fbbf24;
    }

    /* ── Glass ── */
    [data-glass="frosted"] .panel, [data-glass="frosted"] .lemon-card {
      background: var(--glass-frosted); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    [data-glass="clear"] .panel, [data-glass="clear"] .lemon-card {
      background: var(--glass-clear); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    }
    [data-glass="solid"] .panel, [data-glass="solid"] .lemon-card { background: var(--surface); }
    [data-glass="hologram"] .panel, [data-glass="hologram"] .lemon-card {
      background: var(--glass-holo); backdrop-filter: blur(8px) saturate(1.8);
      border-color: var(--glow-border); box-shadow: 0 0 20px var(--glow-shadow), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    #wallpaper { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; transition: background 0.3s, color 0.3s;
    }

    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; }

    /* ── Header ── */
    .header {
      position: relative; z-index: 1;
      padding: 1.5rem 2rem 0; text-align: center;
    }
    .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .logo .chevron, .logo .name { color: var(--accent); }
    .logo .underscore, .logo .core { color: var(--text); }
    .logo .core { font-weight: 900; letter-spacing: 0.1em; }

    .hw-title {
      font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 0.25rem;
    }
    .hw-specs {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 0.15rem 1rem; padding: 0.25rem 0;
    }
    .hw-spec { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

    .divider { width: 100%; height: 1px; background: var(--line); margin: 0.75rem 0 0; }

    /* ── Live stats ── */
    .stats-bar {
      position: relative; z-index: 1;
      padding: 0.75rem 2rem;
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 0.25rem 1.5rem;
    }
    .stat { display: inline-flex; align-items: baseline; gap: 0.35rem; white-space: nowrap; }
    .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-size: 0.85rem; font-weight: 700; color: var(--accent); transition: color 0.3s; }
    .stat-unit { font-size: 0.6rem; color: var(--text-muted); }
    .stat-sep { color: var(--text-muted); opacity: 0.3; font-size: 0.7rem; margin: 0 0.15rem; }

    /* ── Main ── */
    .main {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 2.5rem 2rem 2rem;
    }
    .content { text-align: center; width: 100%; max-width: 900px; }

    /* ── Service cards row ── */
    .cards { display: flex; gap: 1.5rem; margin-bottom: 2rem; justify-content: center; align-items: flex-start; }

    /* ── Small panel (Gaia) ── */
    .panel {
      border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.25rem; text-decoration: none; color: var(--text);
      transition: all 0.3s; display: inline-flex; flex-direction: column; align-items: center;
    }
    .panel:hover { border-color: var(--glow-border); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    .panel-dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 0.5rem; }
    .panel-dot.on { background: var(--green); box-shadow: 0 0 10px var(--dot-green); }
    .panel-dot.off { background: var(--text-muted); }
    .panel-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.25rem; }
    .panel-desc { font-size: 0.8rem; color: var(--text-dim); }

    /* ── Big Lemonade card ── */
    .lemon-card {
      border: 1px solid var(--border); border-radius: 12px;
      padding: 1.25rem 1.5rem; text-decoration: none; color: var(--text);
      transition: all 0.3s; text-align: left; flex: 1; max-width: 600px; cursor: pointer;
      display: block;
    }
    .lemon-card:hover { border-color: var(--glow-border); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

    .lemon-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .lemon-header .panel-dot { margin: 0; }
    .lemon-title { font-size: 1.2rem; font-weight: 700; }
    .lemon-subtitle { font-size: 0.75rem; color: var(--text-dim); margin-left: auto; }
    .lemon-hint { font-size: 0.6rem; color: var(--text-muted); text-align: center; margin-top: 0.75rem; }

    /* ── Model sections inside Lemonade ── */
    .model-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .model-section { }
    .section-title {
      font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.12em; margin-bottom: 0.35rem; display: flex; align-items: center; gap: 0.4rem;
    }
    .section-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
    .section-dot.npu { background: var(--npu-color); }
    .section-dot.gpu { background: var(--gpu-color); }
    .section-dot.image { background: var(--img-color); }
    .section-dot.audio { background: var(--audio-color); }

    .model-list { list-style: none; }
    .model-list li {
      font-size: 0.65rem; color: var(--text-dim); padding: 0.12rem 0;
      display: flex; justify-content: space-between; gap: 0.5rem;
    }
    .model-list .m-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .model-list .m-meta { color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

    /* ── Backend pills ── */
    .backends { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.75rem; }
    .backend-pill {
      font-size: 0.55rem; padding: 0.15rem 0.5rem; border-radius: 4px;
      border: 1px solid var(--border); color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .backend-pill.active { border-color: var(--accent); color: var(--accent); }

    .footer { font-size: 0.7rem; color: var(--text-muted); }

    /* ── Settings ── */
    .settings-btn {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--settings-bg);
      color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; transition: all 0.3s; z-index: 100;
    }
    .settings-btn:hover { color: var(--accent); border-color: var(--accent); transform: rotate(45deg); }
    .settings-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px);
    }
    .settings-overlay.open { display: flex; }
    .settings {
      background: var(--settings-bg); border: 1px solid var(--settings-border);
      border-radius: 12px; padding: 1.5rem; width: 340px; max-height: 80vh; overflow-y: auto;
    }
    .settings h2 { font-size: 1rem; margin-bottom: 1.25rem; color: var(--text); }
    .settings-group { margin-bottom: 1.25rem; }
    .settings-group label {
      display: block; font-size: 0.7rem; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem;
    }
    .settings-options { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .opt-btn {
      padding: 0.35rem 0.7rem; border-radius: 6px;
      border: 1px solid var(--border); background: var(--btn-bg);
      color: var(--text-dim); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .opt-btn:hover { border-color: var(--accent); color: var(--text); }
    .opt-btn.active { background: var(--btn-active); color: #fff; border-color: var(--btn-active); }
    .settings-close {
      width: 100%; margin-top: 0.75rem; padding: 0.5rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--btn-bg);
      color: var(--text); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .settings-close:hover { border-color: var(--accent); }

    @media (max-width: 700px) {
      .header { padding: 1rem 1rem 0; }
      .logo { font-size: 1.2rem; }
      .stats-bar { padding: 0.5rem 1rem; gap: 0.2rem 0.8rem; }
      .cards { flex-direction: column; align-items: center; }
      .lemon-card { max-width: 100%; }
      .model-sections { grid-template-columns: 1fr; }
      .main { padding: 1.5rem 1rem; }
      .settings { width: 90vw; }
    }
  </style>
</head>
<body>
  <div id="wallpaper"></div>

  <!-- Header -->
  <div class="header">
    <div class="logo mono">
      <span class="chevron">&gt;&gt;</span>
      <span class="name"> halo-ai</span><span class="underscore">_</span>
      <span class="core"> CORE</span>
    </div>
    <div class="hw-title mono" id="hw-cpu">loading...</div>
    <div class="hw-specs mono" id="hw-specs"></div>
    <div class="divider"></div>
  </div>

  <!-- Live Stats -->
  <div class="stats-bar mono">
    <div class="stat"><span class="stat-label">cpu</span><span class="stat-value" id="s-cpu">--</span><span class="stat-unit">%</span></div>
    <span class="stat-sep">|</span>
    <div class="stat"><span class="stat-label">ram</span><span class="stat-value" id="s-ram">--</span><span class="stat-unit">%</span></div>
    <span class="stat-sep">|</span>
    <div class="stat"><span class="stat-label">disk</span><span class="stat-value" id="s-disk">--</span><span class="stat-unit">%</span></div>
    <span class="stat-sep">|</span>
    <div class="stat"><span class="stat-label">gpu</span><span class="stat-value" id="s-gpu">--</span><span class="stat-unit">%</span></div>
    <span class="stat-sep">|</span>
    <div class="stat"><span class="stat-label">temp</span><span class="stat-value" id="s-temp">--</span><span class="stat-unit">&deg;C</span></div>
    <span class="stat-sep">|</span>
    <div class="stat"><span class="stat-label">npu</span><span class="stat-value" id="s-npu">--</span></div>
    <span class="stat-sep">|</span>
    <div class="stat"><span class="stat-label">up</span><span class="stat-value" id="s-uptime">--</span></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="content">
      <div class="cards">

        <!-- Lemonade — Big Card -->
        <a class="lemon-card" id="panel-lemonade" href="/" target="_blank">
          <div class="lemon-header">
            <div class="panel-dot off" id="dot-lemonade"></div>
            <span class="lemon-title">Lemonade</span>
            <span class="lemon-subtitle mono" id="lemon-ver">v--</span>
          </div>

          <!-- Backends -->
          <div class="backends mono" id="lemon-backends">
            <span class="backend-pill">loading...</span>
          </div>

          <!-- Models grouped by backend -->
          <div class="model-sections mono" id="lemon-models">
            <div style="grid-column:1/-1;text-align:center;color:var(--text-muted);font-size:0.65rem;">loading catalog...</div>
          </div>

          <div class="lemon-hint mono">click to open Lemonade &rarr;</div>
        </a>

        <!-- Gaia — Small Panel -->
        <a class="panel" id="panel-gaia" href="/" target="_blank">
          <div class="panel-dot off" id="dot-gaia"></div>
          <div class="panel-name">Gaia</div>
          <div class="panel-desc">AI agents</div>
        </a>
      </div>

      <div class="footer mono">designed and built by the architect</div>
    </div>
  </div>

  <!-- Settings -->
  <button class="settings-btn" id="settings-open" title="Customize">&#9881;</button>
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings">
      <h2 class="mono">&gt;&gt; customize_</h2>
      <div class="settings-group"><label>Theme</label>
        <div class="settings-options" data-setting="theme">
          <button class="opt-btn" data-value="dark">Dark</button>
          <button class="opt-btn" data-value="light">Light</button>
          <button class="opt-btn" data-value="midnight">Midnight</button>
          <button class="opt-btn" data-value="ember">Ember</button>
        </div>
      </div>
      <div class="settings-group"><label>Glass</label>
        <div class="settings-options" data-setting="glass">
          <button class="opt-btn" data-value="frosted">Frosted</button>
          <button class="opt-btn" data-value="clear">Clear</button>
          <button class="opt-btn" data-value="solid">Solid</button>
          <button class="opt-btn" data-value="hologram">Hologram</button>
        </div>
      </div>
      <div class="settings-group"><label>Wallpaper</label>
        <div class="settings-options" data-setting="wallpaper">
          <button class="opt-btn" data-value="grid">Grid</button>
          <button class="opt-btn" data-value="dots">Dots</button>
          <button class="opt-btn" data-value="gradient">Gradient</button>
          <button class="opt-btn" data-value="mesh">Mesh</button>
          <button class="opt-btn" data-value="none">None</button>
        </div>
      </div>
      <button class="settings-close" id="settings-close">Done</button>
    </div>
  </div>

  <script>
    const H = window.location.hostname
    const root = document.documentElement

    // ── Service links ──
    document.getElementById('panel-lemonade').href = `http://${H}:13306`
    document.getElementById('panel-gaia').href = `http://${H}:4201`

    // ── Health checks ──
    async function check(id, url) {
      try {
        await fetch(url, { mode: 'no-cors', signal: AbortSignal.timeout(3000) })
        document.getElementById(id).className = 'panel-dot on'
      } catch { document.getElementById(id).className = 'panel-dot off' }
    }
    check('dot-lemonade', `http://${H}:13306/`)
    check('dot-gaia', `http://${H}:4201/`)
    setInterval(() => {
      check('dot-lemonade', `http://${H}:13306/`)
      check('dot-gaia', `http://${H}:4201/`)
    }, 10000)

    // ── Helpers ──
    function fmtBytes(b) { const g = b/(1024**3); return g >= 10 ? Math.round(g)+' GB' : g.toFixed(1)+' GB' }
    function fmtDisk(b) { const t = b/(1024**4); return t >= 1 ? t.toFixed(1)+' TB' : fmtBytes(b) }
    function fmtSize(b) { const g = b/(1024**3); return g >= 1 ? g.toFixed(1)+'G' : Math.round(b/(1024**2))+'M' }
    function fmtUptime(s) {
      const d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60)
      return d > 0 ? d+'d '+h+'h' : h > 0 ? h+'h '+m+'m' : m+'m'
    }

    // ── Hardware + live stats ──
    let hwLoaded = false
    async function fetchStats() {
      try {
        const r = await fetch('/api/stats', { signal: AbortSignal.timeout(3000) })
        const d = await r.json()

        if (!hwLoaded && d.hw) {
          hwLoaded = true
          document.getElementById('hw-cpu').textContent = d.hw.cpu
          const specs = [
            d.hw.cores + ' threads',
            fmtBytes(d.hw.ram_total) + ' RAM',
            d.hw.gpu !== 'N/A' ? d.hw.gpu : null,
            d.hw.vram_total > 0 ? fmtBytes(d.hw.vram_total) + ' VRAM' : null,
            d.hw.npu !== 'N/A' ? d.hw.npu + ' NPU' : null,
            fmtDisk(d.hw.disk_total) + ' SSD',
          ].filter(Boolean)
          document.getElementById('hw-specs').innerHTML = specs
            .map(s => `<span class="hw-spec">${s}</span>`)
            .join('<span class="hw-spec" style="opacity:0.3">&bull;</span>')
        }

        document.getElementById('s-cpu').textContent = d.cpu.usage.toFixed(1)
        document.getElementById('s-ram').textContent = d.ram.percent.toFixed(1)
        document.getElementById('s-disk').textContent = d.disk.percent.toFixed(1)
        document.getElementById('s-gpu').textContent = d.gpu.usage
        document.getElementById('s-temp').textContent = d.cpu.temp || d.gpu.temp || '--'
        document.getElementById('s-npu').textContent = d.npu_online ? 'ONLINE' : 'OFF'
        document.getElementById('s-uptime').textContent = fmtUptime(d.uptime)
      } catch {}
    }
    fetchStats()
    setInterval(fetchStats, 3000)

    // ── Lemonade model catalog ──
    async function fetchModels() {
      try {
        const r = await fetch('/api/models', { signal: AbortSignal.timeout(5000) })
        const models = await r.json()
        if (!models.length) { document.getElementById('lemon-models').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);font-size:0.65rem;">no models</div>'; return }

        // Group
        const groups = { npu: [], gpu: [], image: [], audio: [] }
        models.forEach(m => (groups[m.backend] || groups.gpu).push(m))

        // Backends summary
        const backendInfo = [
          { key: 'npu', label: 'FLM / NPU', count: groups.npu.length },
          { key: 'gpu', label: 'llama.cpp', count: groups.gpu.length },
          { key: 'image', label: 'sd.cpp', count: groups.image.length },
          { key: 'audio', label: 'audio', count: groups.audio.length },
        ]
        document.getElementById('lemon-backends').innerHTML = backendInfo
          .map(b => `<span class="backend-pill ${b.count ? 'active' : ''}">${b.label} (${b.count})</span>`)
          .join('')

        // Version
        document.getElementById('lemon-ver').textContent = models.length + ' models'

        // Render sections
        const labels = { npu: 'NPU — AMD XDNA', gpu: 'GPU — llama.cpp', image: 'Image Generation', audio: 'Audio / Voice' }
        let html = ''
        for (const [key, label] of Object.entries(labels)) {
          const list = groups[key]
          if (!list.length) continue
          html += `<div class="model-section"><div class="section-title"><span class="section-dot ${key}"></span>${label}</div><ul class="model-list">`
          list.forEach(m => {
            const meta = [m.params, m.quant].filter(Boolean).join(' ')
            html += `<li><span class="m-name">${m.name}</span>${meta ? `<span class="m-meta">${meta}</span>` : ''}</li>`
          })
          html += '</ul></div>'
        }
        document.getElementById('lemon-models').innerHTML = html
      } catch {
        document.getElementById('lemon-models').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);font-size:0.65rem;">catalog unavailable</div>'
      }
    }
    fetchModels()
    setInterval(fetchModels, 30000)

    // ── Settings ──
    const STORAGE_KEY = 'halo-dashboard-prefs'
    function loadPrefs() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {} } catch { return {} } }
    function savePrefs(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)) }

    const themeColors = {
      dark:     { line:'230,237,243', accent:'0,212,255', green:'63,185,80' },
      light:    { line:'31,35,40', accent:'0,120,212', green:'26,127,55' },
      midnight: { line:'200,214,229', accent:'79,172,254', green:'0,245,160' },
      ember:    { line:'240,208,192', accent:'255,107,53', green:'255,215,0' }
    }

    function applyWallpaper() {
      const wp = root.getAttribute('data-wallpaper'), theme = root.getAttribute('data-theme')
      const c = themeColors[theme] || themeColors.dark
      const el = document.getElementById('wallpaper')
      if (wp === 'none') { el.style.backgroundImage = 'none'; return }
      let bg, size = 'auto', pos = '0 0'
      if (wp === 'grid') { bg = `linear-gradient(rgba(${c.line},0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(${c.line},0.03) 1px,transparent 1px)`; size = '60px 60px' }
      else if (wp === 'dots') { bg = `radial-gradient(rgba(${c.line},0.07) 1px,transparent 1px)`; size = '30px 30px' }
      else if (wp === 'gradient') { bg = `radial-gradient(ellipse at 30% 20%,rgba(${c.accent},0.1) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(${c.green},0.07) 0%,transparent 50%)` }
      else if (wp === 'mesh') { const a = `rgba(${c.accent},0.05)`; bg = `linear-gradient(30deg,${a} 12%,transparent 12.5%,transparent 87%,${a} 87.5%),linear-gradient(150deg,${a} 12%,transparent 12.5%,transparent 87%,${a} 87.5%),linear-gradient(30deg,${a} 12%,transparent 12.5%,transparent 87%,${a} 87.5%),linear-gradient(150deg,${a} 12%,transparent 12.5%,transparent 87%,${a} 87.5%)`; size = '80px 140px'; pos = '0 0,0 0,40px 70px,40px 70px' }
      el.style.backgroundImage = bg || 'none'; el.style.backgroundSize = size; el.style.backgroundPosition = pos
    }

    function applySetting(key, value) {
      root.setAttribute(`data-${key}`, value)
      const p = loadPrefs(); p[key] = value; savePrefs(p)
      document.querySelectorAll(`[data-setting="${key}"] .opt-btn`).forEach(btn => btn.classList.toggle('active', btn.dataset.value === value))
      if (key === 'theme' || key === 'wallpaper') applyWallpaper()
    }

    const saved = loadPrefs()
    if (saved.theme) applySetting('theme', saved.theme)
    if (saved.glass) applySetting('glass', saved.glass)
    if (saved.wallpaper) applySetting('wallpaper', saved.wallpaper)
    ;['theme','glass','wallpaper'].forEach(k => {
      const v = root.getAttribute(`data-${k}`)
      document.querySelectorAll(`[data-setting="${k}"] .opt-btn`).forEach(b => b.classList.toggle('active', b.dataset.value === v))
    })

    const overlay = document.getElementById('settings-overlay')
    document.getElementById('settings-open').addEventListener('click', () => overlay.classList.add('open'))
    document.getElementById('settings-close').addEventListener('click', () => overlay.classList.remove('open'))
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open') })
    document.querySelectorAll('.opt-btn').forEach(btn => btn.addEventListener('click', () => applySetting(btn.closest('[data-setting]').dataset.setting, btn.dataset.value)))
    applyWallpaper()
  </script>
</body>
</html>
