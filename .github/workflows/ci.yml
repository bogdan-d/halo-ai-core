name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax:
    name: Shell Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: bash -n on all shell scripts
        run: |
          set -e
          for f in install.sh install-strixhalo.sh install-source.sh uninstall-rocmpp.sh bench.sh burn-remote.sh; do
            [[ -f "$f" ]] && bash -n "$f" && echo "ok: $f"
          done

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint install scripts
        run: |
          for f in install.sh install-strixhalo.sh install-source.sh; do
            [[ -f "$f" ]] && shellcheck "$f" --severity=error || true
          done
